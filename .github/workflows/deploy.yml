name: ci-deploy

# True CI/CD deploy pipeline (no release-please).
#
#   Stages run strictly in order; a later stage only starts if every earlier one passed:
#     1. preflight   - lint, static security scan, dep audit, byte-compile, unit/alert tests
#     2. version     - resolve the version + tag from version.txt (single source of truth)
#     3. build       - PyInstaller one-dir build on Windows + Linux
#     4. test-build  - smoke-test the *packaged* app headless (runs inside each build job)
#     5. tag         - create + push vX.Y.Z, but ONLY if all builds/tests passed and the
#                      tag does not already exist (idempotent: one release per version bump)
#     6. release     - verify SHA256SUMS, then publish the GitHub Release with signed assets
#
#   Triggers:
#     push to main      -> full pipeline; auto-tag + release when version.txt is bumped
#     push tag v*       -> full pipeline against that tag (manual release path)
#     pull_request       -> preflight + build + test-build only (verification, never releases)
#     workflow_dispatch -> preflight + build + test-build only (dry run, artifacts only)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"   # newest Python PySide6 6.11 supports (<3.15)

jobs:
  # ---------------------------------------------------------------- 1. preflight
  preflight:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install runtime + analysis tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock --require-hashes
          pip install ruff bandit pip-audit
      - name: Lint (ruff)
        run: ruff check app
      - name: Static security scan (bandit)
        run: bandit -r app --severity-level medium --confidence-level medium
      - name: Byte-compile all sources
        run: python -m compileall -q app
      - name: Dependency vulnerability audit (pip-audit)
        run: pip-audit -r requirements.lock --strict
      - name: Unit / detection tests
        run: python tools/pentest/test_alerts.py
      - name: Dependency review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  # ---------------------------------------------------------------- 2. version
  # Version is derived from git tags, not from version.txt (which is treated as a
  # synced artifact, updated by the release job to match the last release).
  #   - main push      -> auto patch-bump from the highest existing vX.Y.Z tag
  #                       (v1 normalizes to 1.0.0, so the next release is 1.0.1)
  #   - tag push (v*)  -> release exactly that tag, no bump
  #   - PR / dispatch  -> <next>-ci.<run> dry-run version, never released
  version:
    needs: preflight
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      is_release: ${{ steps.v.outputs.is_release }}
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0   # need full tag history to find the latest version
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          # Highest semver-ish tag, normalized to MAJOR.MINOR.PATCH (v1 -> 1.0.0).
          LATEST="$(git tag -l 'v*' \
            | sed -E 's/^v//' \
            | awk -F. 'NF>=1 && $1 ~ /^[0-9]+$/ {printf "%d.%d.%d\n", $1, ($2==""?0:$2), ($3==""?0:$3)}' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1)"
          LATEST="${LATEST:-0.0.0}"
          IFS=. read -r MA MI PA <<< "$LATEST"
          NEXT="${MA}.${MI}.$((PA + 1))"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION"; echo "tag=v$VERSION"; echo "is_release=true"
          elif [[ "$GITHUB_REF" == refs/heads/main && "$GITHUB_EVENT_NAME" == push ]]; then
            echo "::notice::latest tag = v${LATEST} -> next release = v${NEXT}"
            echo "version=$NEXT"; echo "tag=v$NEXT"; echo "is_release=true"
          else
            echo "version=${NEXT}-ci.${GITHUB_RUN_NUMBER}"; echo "tag="; echo "is_release=false"
          fi >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- 3+4. build + test-build (windows)
  build-windows:
    needs: [preflight, version]
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Stamp resolved version into sources
        shell: bash
        run: |
          python -c "import pathlib,re,os; v=os.environ['VERSION']; pathlib.Path('version.txt').write_text(v+'\n'); p=pathlib.Path('app/__init__.py'); p.write_text(re.sub(r'__version__\s*=\s*\".*?\"', f'__version__ = \"{v}\"', p.read_text()))"
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock --require-hashes
          pip install pyinstaller cyclonedx-bom
      - name: Build (PyInstaller one-dir)
        shell: bash
        run: python -m PyInstaller packaging/windows/darkelf.spec --noconfirm --clean --distpath dist --workpath build/pyi
      - name: Test build — smoke test the packaged app (headless)
        shell: pwsh
        run: |
          $env:DARKELF_NO_FILTERS = "1"
          $env:DARKELF_AUTOQUIT = "4000"
          $env:QTWEBENGINE_DISABLE_SANDBOX = "1"
          $env:DARKELF_EXTRA_CHROMIUM_FLAGS = "--no-sandbox --disable-gpu --disable-software-rasterizer"
          $p = Start-Process -FilePath "dist\DarkelfShadow\DarkelfShadow.exe" -PassThru
          if (-not $p.WaitForExit(120000)) { $p.Kill(); throw "smoke test timed out" }
          if ($p.ExitCode -ne 0) { throw "smoke test failed: exit $($p.ExitCode)" }
          Write-Host "smoke test OK"
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "packaging\windows\darkelf.iss"
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path "dist\DarkelfShadow\*" -DestinationPath "out\DarkelfShadow-windows-x64-$env:VERSION.zip"
          Copy-Item "dist\installer\DarkelfShadow-Setup-$env:VERSION.exe" "out\"
      - name: Generate SBOM
        shell: bash
        run: cyclonedx-py environment --output-format json -o "out/sbom-windows-${VERSION}.json"
      - name: Sign — SHA256 checksums
        shell: bash
        run: |
          cd out
          : > SHA256SUMS-windows.txt
          for f in *.zip *.exe *.json; do
            [ -e "$f" ] || continue
            sha256sum "$f" | tee -a SHA256SUMS-windows.txt
          done
          cat SHA256SUMS-windows.txt
      - name: Attest build provenance (signed, releases only)
        if: needs.version.outputs.is_release == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            out/*.zip
            out/*.exe
      - uses: actions/upload-artifact@v7
        with:
          name: darkelf-windows
          path: out/
          retention-days: 14
          if-no-files-found: error

  # ---------------------------------------------------------------- 3+4. build + test-build (linux)
  build-linux:
    needs: [preflight, version]
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install runtime + test libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 libnspr4 libxcomposite1 libxdamage1 libxrandr2 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 \
            libgbm1 libegl1 libgl1 libasound2 fonts-liberation
      - name: Stamp resolved version into sources
        run: |
          python -c "import pathlib,re,os; v=os.environ['VERSION']; pathlib.Path('version.txt').write_text(v+'\n'); p=pathlib.Path('app/__init__.py'); p.write_text(re.sub(r'__version__\s*=\s*\".*?\"', f'__version__ = \"{v}\"', p.read_text()))"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock --require-hashes
          pip install pyinstaller cyclonedx-bom
      - name: Build (PyInstaller one-dir)
        run: python -m PyInstaller packaging/linux/darkelf.spec --noconfirm --clean --distpath dist --workpath build/pyi
      - name: Test build — smoke test the packaged app (xvfb headless)
        env:
          DARKELF_NO_FILTERS: "1"
          DARKELF_AUTOQUIT: "4000"
          QTWEBENGINE_DISABLE_SANDBOX: "1"
          DARKELF_EXTRA_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu"
          QT_QPA_PLATFORM: "xcb"
        run: |
          xvfb-run -a -s "-screen 0 1280x1024x24" ./dist/DarkelfShadow/DarkelfShadow
          echo "smoke test OK (exit $?)"
      - name: Build AppImage
        run: |
          mkdir -p out
          bash packaging/linux/build_appimage.sh "${VERSION}" "dist" "out"
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json -o "out/sbom-linux-${VERSION}.json"
      - name: Scan SBOM for vulnerabilities (grype)
        # The CycloneDX SBOM lists the Python packages actually frozen into the
        # build (identical set on both OSes), so scanning the Linux SBOM covers
        # the dependency CVE surface. Fails the build on a high or critical CVE.
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$RUNNER_TEMP/grype-bin"
          "$RUNNER_TEMP/grype-bin/grype" "sbom:out/sbom-linux-${VERSION}.json" --fail-on high
      - name: Sign — SHA256 checksums
        run: |
          cd out
          : > SHA256SUMS-linux.txt
          for f in *.AppImage *.json; do
            [ -e "$f" ] || continue
            sha256sum "$f" | tee -a SHA256SUMS-linux.txt
          done
          cat SHA256SUMS-linux.txt
      - name: Attest build provenance (signed, releases only)
        if: needs.version.outputs.is_release == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: out/*.AppImage
      - uses: actions/upload-artifact@v7
        with:
          name: darkelf-linux
          path: out/
          retention-days: 14
          if-no-files-found: error

  # ---------------------------------------------------------------- 5. bump + tag
  # main push only: commit the patch-bumped version.txt + __init__.py back to main
  # and tag THAT commit, so the release tag points at the code carrying its version.
  # Tag-driven (refs/tags/v*) runs skip this — the tag already exists.
  bump-and-tag:
    needs: [version, build-windows, build-linux]
    if: >-
      needs.version.outputs.is_release == 'true'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ needs.version.outputs.tag }}
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - id: tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::${TAG} already exists — skipping (no new release)."
            echo "created=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Persist the resolved version (GITHUB_TOKEN pushes don't re-trigger CI;
          # [skip ci] is belt-and-suspenders against any future PAT-based trigger).
          python -c "import pathlib,re,os; v=os.environ['VERSION']; pathlib.Path('version.txt').write_text(v+'\n'); p=pathlib.Path('app/__init__.py'); p.write_text(re.sub(r'__version__\s*=\s*\".*?\"', f'__version__ = \"{v}\"', p.read_text()))"
          git add version.txt app/__init__.py
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin HEAD:main
          git push origin "${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- 6. release (only if it passes)
  release:
    needs: [version, build-windows, build-linux, bump-and-tag]
    # Releases on either: a freshly-created tag from main, OR a manual tag push.
    if: >-
      always()
      && needs.build-windows.result == 'success'
      && needs.build-linux.result == 'success'
      && (
           needs.bump-and-tag.outputs.created == 'true'
           || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
         )
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect assets + verify SHA256 signatures
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          echo "Verifying SHA256SUMS..."
          fail=0
          for s in SHA256SUMS-*.txt; do
            [ -e "$s" ] || continue
            echo "== $s =="
            sha256sum -c "$s" || fail=1
          done
          if [ "$fail" -ne 0 ]; then echo "::error::checksum verification failed"; exit 1; fi
          # Aggregate, de-duplicated manifest across both platforms.
          cat SHA256SUMS-*.txt | sort -u > SHA256SUMS.txt
          echo "---- combined SHA256SUMS.txt ----"; cat SHA256SUMS.txt
          ls -la
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Darkelf Shadow ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.zip
            release/*.AppImage
            release/*.json
            release/SHA256SUMS.txt

  # ---------------------------------------------------------------- 7. publish to PyPI
  # Builds the sdist + wheel and uploads them to PyPI using OIDC trusted
  # publishing (no stored API token). Runs only for real releases.
  #
  # One-time setup on PyPI: create the project and add a trusted publisher for
  #   owner: oracle-actual   repo: Darkelf-Shadow   workflow: deploy.yml
  # Leave the publisher's "environment" field blank to match this job. See
  # https://docs.pypi.org/trusted-publishers/ . You can optionally add a
  # GitHub Environment here later to require manual approval before a release.
  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: [version, build-windows, build-linux]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      id-token: write   # OIDC token for PyPI trusted publishing
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Stamp resolved version into sources
        run: |
          python -c "import pathlib,re,os; v=os.environ['VERSION']; pathlib.Path('version.txt').write_text(v+'\n'); p=pathlib.Path('app/__init__.py'); p.write_text(re.sub(r'__version__\s*=\s*\".*?\"', f'__version__ = \"{v}\"', p.read_text()))"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
