# Install dependencies, lint, test, and verify the pip/pyproject package builds
# and its installed entry point launches — on every shippable OS.
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  # Newest Python PySide6 6.11 supports (Requires-Python <3.15).
  PYTHON_VERSION: "3.14"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.lock --require-hashes
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: pytest

  # Verify the pip packaging is complete: build the wheel, install it, and
  # confirm the `darkelf-shadow` entry point actually launches — on Linux AND
  # Windows, on the same Python the apps ship with.
  package:
    needs: lint-test
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Qt runtime libraries (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libegl1 libgl1 libglib2.0-0 libnss3 libnspr4 libdbus-1-3 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
          libxcb-cursor0 libasound2t64 fonts-liberation
    - name: Build the wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build --wheel
    - name: Install the built wheel
      shell: bash
      run: pip install dist/*.whl
    - name: Smoke-test the installed app (headless)
      shell: bash
      env:
        QT_QPA_PLATFORM: offscreen
        DARKELF_NO_FILTERS: "1"
        DARKELF_AUTOQUIT: "4000"
        QTWEBENGINE_DISABLE_SANDBOX: "1"
        DARKELF_EXTRA_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu"
      run: |
        # Run from a neutral dir so the repo's ./app cannot shadow the install.
        mkdir -p "$HOME/smoke" && cd "$HOME/smoke"
        darkelf-shadow
        echo "packaging smoke OK"
